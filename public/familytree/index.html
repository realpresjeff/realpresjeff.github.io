        // Function to recursively generate HTML list items for each family member
        function createFamilyTree(member) {
            let titles = member.title ? ` (${member.title.join(', ')})` : "";
            let spouse = member.spouse ? `, Spouse: ${member.spouse}` : "";

            let listItem = document.createElement('li');
            listItem.innerHTML = `<span class="toggle" onclick="toggleVisibility(event)">+</span> ${member.name}${titles}${spouse}`;

            if (member.issue && member.issue.length > 0) {
                let list = document.createElement('ul');
                list.className = 'tree'; // Hide children initially
                member.issue.forEach(child => {
                    list.appendChild(createFamilyTree(child));
                });
                listItem.appendChild(list);
            }
            return listItem;
        }

        // Append the tree to the root HTML element
        document.getElementById('familyTree').appendChild(createFamilyTree(familyData));

        // Function to toggle visibility of child lists
        function toggleVisibility(event) {
            let target = event.target;
            let list = target.parentNode.querySelector('.tree');
            if (list) {
                list.classList.toggle('hidden');
                target.innerText = list.classList.contains('hidden') ? '+' : '-';
            }
        }
